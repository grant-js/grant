services:
  postgres:
    image: postgres:16-alpine
    container_name: grant-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grant_platform}
      POSTGRES_USER: ${POSTGRES_USER:-grant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grant_password}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-grant_user} -d ${POSTGRES_DB:-grant_platform}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-platform-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grant-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@grant.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-grant_password}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - grant-platform-network

  redis:
    image: redis:7-alpine
    container_name: grant-platform-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-grant_redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - grant-platform-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: grant-platform-redisinsight
    ports:
      - '5540:5540'
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - grant-platform-network

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redisinsight_data:

networks:
  grant-platform-network:
    driver: bridge
