query MyUserSessions($input: MyUserSessionsInput!) {
  myUserSessions(input: $input) {
    userSessions {
      id
      userId
      userAuthenticationMethodId
      userAuthenticationMethod {
        provider
        providerId
      }
      audience
      expiresAt
      lastUsedAt
      userAgent
      ipAddress
      createdAt
    }
    totalCount
    hasNextPage
  }
}
