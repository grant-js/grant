type UserDataExport {
  user: UserExportData!
  accounts: [AccountExportData!]!
  authenticationMethods: [AuthenticationMethodExportData!]!
  sessions: [SessionExportData!]!
  organizationMemberships: [OrganizationMembershipExportData!]!
  projectMemberships: [ProjectMembershipExportData!]!
  exportedAt: Date!
}

type UserExportData {
  id: ID!
  name: String!
  email: String
  createdAt: Date!
  updatedAt: Date!
}

type AccountExportData {
  id: ID!
  name: String!
  slug: String!
  type: String!
  createdAt: Date!
  updatedAt: Date!
}

type AuthenticationMethodExportData {
  provider: String!
  providerId: String!
  isVerified: Boolean!
  isPrimary: Boolean!
  lastUsedAt: Date
  createdAt: Date!
}

type SessionExportData {
  userAgent: String
  ipAddress: String
  lastUsedAt: Date
  expiresAt: Date!
  createdAt: Date!
}

type OrganizationMembershipExportData {
  organizationId: ID!
  organizationName: String!
  role: String!
  joinedAt: Date!
}

type ProjectMembershipExportData {
  projectId: ID!
  projectName: String!
  role: String!
  joinedAt: Date!
}
