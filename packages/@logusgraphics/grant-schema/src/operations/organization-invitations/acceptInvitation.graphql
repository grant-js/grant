mutation AcceptInvitation($input: AcceptInvitationInput!) {
  acceptInvitation(input: $input) {
    requiresRegistration
    isNewUser
    user {
      id
      name
      createdAt
    }
    accounts {
      id
      name
      slug
      type
    }
    invitation {
      id
      email
      status
    }
  }
}
