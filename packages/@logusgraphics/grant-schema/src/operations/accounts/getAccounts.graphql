query GetAccounts($page: Int, $limit: Int, $sort: AccountSortInput, $search: String, $ids: [ID!]) {
  accounts(page: $page, limit: $limit, sort: $sort, search: $search, ids: $ids) {
    accounts {
      id
      name
      slug
      type
      ownerId
      createdAt
      updatedAt
    }
    totalCount
    hasNextPage
  }
}
