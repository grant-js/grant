mutation UpdateOrganizationMember(
  $userId: ID!
  $organizationId: ID!
  $input: UpdateOrganizationMemberInput!
) {
  updateOrganizationMember(userId: $userId, organizationId: $organizationId, input: $input) {
    id
    name
    email
    type
    role {
      id
      name
      description
    }
    status
    user {
      id
      name
    }
    invitation {
      id
      email
      status
    }
    createdAt
  }
}
