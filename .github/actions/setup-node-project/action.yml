# Composite action: Node + pnpm + native pnpm cache + install.
# Single place for install logic; used by ci.yml and release.yml.
# Pin checkout in each workflow job that needs the repo (e.g. actions/checkout@v4.2.2, fetch-depth: 0).
# pnpm is enabled via corepack in the same step as install so PATH is reliable in composite steps.
name: Setup Node project
description: Setup Node.js, pnpm with native cache, and install dependencies
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6.1.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
        pnpm install --frozen-lockfile

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '24'
  pnpm-version:
    description: pnpm version
    required: false
    default: '8.15.0'
